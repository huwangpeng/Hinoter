<title>华为笔记 · hinote 矢量查看器</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --ink: #1d2129;
    --muted: #6b7280;
    --line: #e5e7eb;
    --accent: #2563eb;
    --accent-soft: #dbeafe;
    --ok: #16a34a;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }
  header {
    padding: 28px 24px 20px;
    text-align: center;
  }
  header h1 { font-size: 24px; font-weight: 700; letter-spacing: 0.5px; }
  header p { margin-top: 6px; color: var(--muted); font-size: 13px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 16px 60px; }

  /* Drop zone */
  #dropzone {
    border: 2px dashed #c3cbd6;
    border-radius: var(--radius);
    background: var(--card);
    padding: 56px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  #dropzone:hover, #dropzone.drag { border-color: var(--accent); background: var(--accent-soft); }
  #dropzone .icon { font-size: 40px; }
  #dropzone .icon img { width: 56px; height: 56px; object-fit: contain; display: inline-block; vertical-align: middle; }
  #dropzone h2 { font-size: 17px; margin-top: 12px; }
  #dropzone p { color: var(--muted); font-size: 13px; margin-top: 6px; }
  #dropzone .btn {
    display: inline-block; margin-top: 16px; padding: 9px 22px;
    background: var(--accent); color: #fff; border-radius: 8px; font-size: 14px;
  }
  input[type=file] { display: none; }

  /* Progress */
  #progressWrap { margin-top: 20px; display: none; }
  .bar { height: 10px; background: #e9edf3; border-radius: 99px; overflow: hidden; }
  .bar > div {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #2563eb, #38bdf8);
    border-radius: 99px; transition: width .15s ease;
  }
  #progressText { margin-top: 8px; font-size: 13px; color: var(--muted); text-align: center; }

  /* Toolbar */
  #toolbar {
    display: none; margin-top: 24px;
    align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  #toolbar .meta { font-size: 14px; color: var(--muted); }
  #toolbar .meta b { color: var(--ink); }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn2 {
    padding: 9px 18px; border-radius: 8px; font-size: 14px; border: 1px solid var(--line);
    background: var(--card); color: var(--ink); cursor: pointer; transition: all .15s;
  }
  .btn2:hover { border-color: var(--accent); color: var(--accent); }
  .btn2.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn2.primary:hover { background: #1d4ed8; color:#fff; }
  .btn2:disabled { opacity: .5; cursor: default; }

  /* Page grid */
  #grid {
    display: none; margin-top: 18px;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 14px;
  }
  .page-card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    overflow: hidden; cursor: zoom-in; transition: transform .12s, box-shadow .12s;
  }
  .page-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.09); }
  /* 缩略图按页面真实宽高比渲染（横向页不再被拉伸为纵向） */
  .page-card .thumb { width: 100%; aspect-ratio: var(--ar, 1000 / 1414); background: #fff; }
  .page-card .thumb svg { width: 100%; height: 100%; display: block; }
  .page-card .label {
    padding: 8px 12px; font-size: 12px; color: var(--muted);
    display: flex; justify-content: space-between; border-top: 1px solid var(--line);
  }
  .page-card .label .ori { color: var(--accent); font-weight: 600; }

  /* 横向（landscape）视图：水平滚动浏览横向笔记，页面按视口高度适配宽屏 */
  body.landscape-mode #grid {
    display: flex; flex-direction: row; flex-wrap: nowrap;
    overflow-x: auto; overflow-y: hidden; gap: 18px;
    margin-top: 18px; padding-bottom: 16px;
    scroll-snap-type: x proximity; -webkit-overflow-scrolling: touch;
  }
  body.landscape-mode #grid::-webkit-scrollbar { height: 10px; }
  body.landscape-mode #grid::-webkit-scrollbar-thumb { background: #c3cbd6; border-radius: 99px; }
  body.landscape-mode .page-card {
    flex: 0 0 auto; width: auto; height: calc(100vh - 220px);
    aspect-ratio: var(--ar, 1000 / 1414); scroll-snap-align: center;
  }
  body.landscape-mode .page-card .thumb { width: 100%; height: 100%; }

  /* Modal */
  #modal {
    position: fixed; inset: 0; background: rgba(15,20,30,.75);
    display: none; align-items: center; justify-content: center; z-index: 50; padding: 24px;
  }
  #modal.open { display: flex; }
  #modal .box {
    background: #fff; border-radius: var(--radius); max-width: min(1100px, 94vw);
    max-height: 92vh; overflow: auto; padding: 14px;
  }
  /* 大图预览自适应视口：横向页按高度缩放、纵向页按宽度缩放，均保留比例 */
  #modal .box svg {
    display: block; margin: 0 auto; width: auto; height: auto;
    max-width: 100%; max-height: 84vh;
  }
  #modal .close {
    position: fixed; top: 18px; right: 26px; color: #fff; font-size: 30px; cursor: pointer; user-select: none;
  }

  #notice { margin-top: 16px; font-size: 13px; color: var(--muted); text-align: center; display:none; }

  @media (max-width: 560px) {
    header h1 { font-size: 20px; }
    #grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    #dropzone { padding: 40px 16px; }
  }
</style>
</head>

<script>
"use strict";
/* ============================================================
 * 华为 .hinote 纯本地解析 + 矢量渲染
 * 管线: ZIP -> GZIP+JSON -> PENCILENGINE -> SVG / PDF
 * 全部使用浏览器原生 API，无任何后端依赖。
 * ============================================================ */

const POINT_STRIDE = 36;

/* ---------- 通用工具 ---------- */
const fmt = v => (+v).toFixed(3).replace(/\.?0+$/,"");
const te = new TextEncoder();

function tick() { return new Promise(r => setTimeout(r, 0)); }  // 让 UI 有机会刷新进度条

async function inflateRaw(bytes) {
  const ds = new DecompressionStream("deflate-raw");
  const stream = new Blob([bytes]).stream().pipeThrough(ds);
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
async function gunzip(bytes) {
  const ds = new DecompressionStream("gzip");
  const stream = new Blob([bytes]).stream().pipeThrough(ds);
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
async function deflate(bytes) {  // zlib 格式（PDF FlateDecode 需要）
  const cs = new CompressionStream("deflate");
  const stream = new Blob([bytes]).stream().pipeThrough(cs);
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
function u8concat(parts) {
  let n = 0; for (const p of parts) n += p.length;
  const out = new Uint8Array(n); let o = 0;
  for (const p of parts) { out.set(p, o); o += p.length; }
  return out;
}
function base64(bytes) {
  let s = "";
  const CH = 0x8000;
  for (let i = 0; i < bytes.length; i += CH)
    s += String.fromCharCode.apply(null, bytes.subarray(i, i + CH));
  return btoa(s);
}

/* ---------- 极简 ZIP 读取（存储 + deflate） ---------- */
function readZip(buf) {
  const dv = new DataView(buf.buffer, buf.byteOffset, buf.byteLength);
  // 找 EOCD（末尾 22 字节起向前搜）
  let eocd = -1;
  for (let i = buf.length - 22; i >= 0 && i > buf.length - 65558; i--) {
    if (dv.getUint32(i, true) === 0x06054b50) { eocd = i; break; }
  }
  if (eocd < 0) throw new Error("不是有效的 ZIP/hinote 文件");
  const count = dv.getUint16(eocd + 10, true);
  let ptr = dv.getUint32(eocd + 16, true);
  const entries = {};
  for (let k = 0; k < count; k++) {
    if (dv.getUint32(ptr, true) !== 0x02014b50) break;
    const method = dv.getUint16(ptr + 10, true);
    const compSize = dv.getUint32(ptr + 20, true);
    const nameLen = dv.getUint16(ptr + 28, true);
    const extraLen = dv.getUint16(ptr + 30, true);
    const commentLen = dv.getUint16(ptr + 32, true);
    const localOff = dv.getUint32(ptr + 42, true);
    const name = new TextDecoder().decode(buf.subarray(ptr + 46, ptr + 46 + nameLen));
    entries[name] = { method, compSize, localOff, name };
    ptr += 46 + nameLen + extraLen + commentLen;
  }
  // 读取各条目的数据
  const files = {};
  for (const name in entries) {
    const e = entries[name];
    const lh = e.localOff;
    const nl = dv.getUint16(lh + 26, true);
    const el = dv.getUint16(lh + 28, true);
    const dataStart = lh + 30 + nl + el;
    const raw = buf.slice(dataStart, dataStart + e.compSize);
    const short = name.split("/").pop();
    files[short] = { raw, method: e.method, fullName: name };
  }
  return files;
}

/* ---------- PENCILENGINE 解析 ---------- */
function parsePencilEngine(bytes) {
  const dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  const u32 = o => dv.getUint32(o, false);
  const f32 = o => dv.getFloat32(o, false);
  const magic = new TextDecoder().decode(bytes.subarray(0, 12));
  if (magic !== "PENCILENGINE") return [];
  const strokes = [];
  const finite = v => Number.isFinite(v) && -100000 < v && v < 100000;

  for (let off = 60; off < bytes.length - 16; off += 4) {
    const prefix = u32(off), count = u32(off + 4), stride = u32(off + 8), resv = u32(off + 12);
    if (!(prefix === 0 || prefix === 2) || count < 2 || count > 16384 || stride !== POINT_STRIDE || resv !== 0) continue;
    const ptsEnd = off + 16 + count * stride;
    if (ptsEnd > bytes.length) continue;

    const points = [], pressures = [];
    let bad = false;
    for (let i = 0; i < count; i++) {
      const po = off + 16 + i * stride;
      const x = f32(po + 4), y = f32(po + 8), p = f32(po + 16);
      if (!finite(x) || !finite(y)) { bad = true; break; }
      points.push([x, y]);
      pressures.push(Number.isFinite(p) && p > 0 ? p : 0);
    }
    if (bad || points.length < 2) continue;
    const xs = points.map(p => p[0]), ys = points.map(p => p[1]);
    if (Math.max(...xs) === Math.min(...xs) && Math.max(...ys) === Math.min(...ys)) continue;

    // 压感回填
    if (pressures.some(p => p > 0)) {
      let last = pressures.find(p => p > 0);
      for (let i = 0; i < pressures.length; i++) {
        if (pressures[i] === 0) pressures[i] = last; else last = pressures[i];
      }
    } else pressures.fill(0.2);

    const so = off - 60;
    let baseWidth = f32(so + 40);
    if (!Number.isFinite(baseWidth) || baseWidth <= 0 || baseWidth > 100) baseWidth = 4.0;
    const penType = u32(so + 12);
    if (![1, 2, 3, 5].includes(penType)) continue;
    const softness = f32(so + 32);
    const colorValue = u32(so + 8);

    let color, opacity;
    if (colorValue !== 0 && colorValue !== 0xFFFFFFFF) {
      color = [(colorValue >> 16) & 0xFF, (colorValue >> 8) & 0xFF, colorValue & 0xFF];
      opacity = 1.0;
    } else {
      const comps = [f32(so + 20), f32(so + 24), f32(so + 28)];
      if (comps.every(c => Number.isFinite(c) && 0 <= c && c <= 1) && comps.some(c => c > 0)) {
        // 颜色浮点分量顺序随版本不同：新版 style+4 标志为 0x01000000/0x01010000 时
        // 普通笔/铅笔/毛笔按 RGB 存储；旧版按 BGR 存储（红蓝互换）。
        // 荧光笔 type5 在所有版本里都是 BGR。
        const flag = u32(so + 4);
        const isNew = flag === 0x01000000 || flag === 0x01010000;
        const ordered = (penType === 5 || !isNew) ? [...comps].reverse() : comps;
        color = ordered.map(c => Math.round(c * 255));
        if (penType === 5) opacity = (Number.isFinite(softness) && softness > 0 && softness <= 1) ? softness : 0.35;
        else if (penType === 3 && Number.isFinite(softness) && softness > 0 && softness <= 1) opacity = softness;
        else opacity = 1.0;
      } else { color = [0, 0, 0]; opacity = 1.0; }
    }
    strokes.push({ points, pressures, baseWidth, color, opacity, penType });
  }
  return strokes;
}

/* ---------- 笔画轮廓（整笔填充 + 端帽下限 + Chaikin 平滑） ---------- */
function strokeWidth(stroke, p) {
  // 荧光笔（type 5）是标记笔宽度，旧版 hinote 记录的压感值是噪声/极小，
  // 直接以 baseWidth 作为固定宽度渲染，避免早期文件的高亮条过细。
  if (stroke.penType === 5) return Math.max(0.1, stroke.baseWidth * 0.8);
  return Math.max(0.1, p * stroke.baseWidth * 0.8);
}

function chaikinSmooth(pts) {
  const m = pts.length;
  if (m < 3) return pts;
  const out = [];
  for (let i = 0; i < m; i++) {
    const p0 = pts[i], p1 = pts[(i + 1) % m];
    out.push([0.75 * p0[0] + 0.25 * p1[0], 0.75 * p0[1] + 0.25 * p1[1]]);
    out.push([0.25 * p0[0] + 0.75 * p1[0], 0.25 * p0[1] + 0.75 * p1[1]]);
  }
  return out;
}

function strokeOutline(stroke) {
  const pts = stroke.points, pr = stroke.pressures, n = pts.length;
  if (n < 2) return null;
  const tangents = [];
  for (let i = 0; i < n; i++) {
    let dx, dy;
    if (i === 0) { dx = pts[1][0] - pts[0][0]; dy = pts[1][1] - pts[0][1]; }
    else if (i === n - 1) { dx = pts[n-1][0] - pts[n-2][0]; dy = pts[n-1][1] - pts[n-2][1]; }
    else { dx = pts[i+1][0] - pts[i-1][0]; dy = pts[i+1][1] - pts[i-1][1]; }
    const L = Math.hypot(dx, dy);
    tangents.push(L ? [dx / L, dy / L] : [1, 0]);
  }
  const left = [], right = [], cx = [], cy = [], rad = [];
  for (let i = 0; i < n; i++) {
    const [tx, ty] = tangents[i], nx = -ty, ny = tx;
    const r = strokeWidth(stroke, pr[i]) / 2;
    const [x, y] = pts[i];
    left.push([x + nx * r, y + ny * r]);
    right.push([x - nx * r, y - ny * r]);
    cx.push(x); cy.push(y); rad.push(r);
  }
  // 端帽下限：压力收尾常趋零导致锐角，限制为峰值 45%
  const capFloor = Math.max(...rad) * 0.45;
  for (const idx of [0, n - 1]) {
    if (rad[idx] < capFloor) {
      rad[idx] = capFloor;
      const [tx, ty] = tangents[idx], nx = -ty, ny = tx;
      const [x, y] = pts[idx];
      left[idx] = [x + nx * capFloor, y + ny * capFloor];
      right[idx] = [x - nx * capFloor, y - ny * capFloor];
    }
  }
  const outline = [...left];
  const steps = 24;
  let a0 = Math.atan2(left[n-1][1] - cy[n-1], left[n-1][0] - cx[n-1]);
  for (let s = 1; s <= steps; s++) {
    const a = a0 - Math.PI * s / steps;
    outline.push([cx[n-1] + rad[n-1] * Math.cos(a), cy[n-1] + rad[n-1] * Math.sin(a)]);
  }
  for (let i = right.length - 1; i >= 0; i--) outline.push(right[i]);
  a0 = Math.atan2(right[0][1] - cy[0], right[0][0] - cx[0]);
  for (let s = 1; s <= steps; s++) {
    const a = a0 - Math.PI * s / steps;
    outline.push([cx[0] + rad[0] * Math.cos(a), cy[0] + rad[0] * Math.sin(a)]);
  }
  return chaikinSmooth(outline);
}

const isHighlighter = s => s.penType === 5 || s.opacity < 1.0;
const colorHex = c => "#" + c.map(v => v.toString(16).padStart(2, "0")).join("");

/* ---------- 背景网格 ---------- */
const GRID_COLOR = "#dddddd";
const GRID_LINE_WIDTH = 0.8, DOT_RADIUS = 1.3;
const BACKGROUND_GRIDS = {
  base2: { type: "grid",   spacing: 101.0, x0: 102, y0: 101 },
  base3: { type: "grid",   spacing: 58.3,  x0: 62,  y0: 59 },
  base4: { type: "hlines", spacing: 75.0,  x0: 0,   y0: 71 },
  base5: { type: "hlines", spacing: 47.0,  x0: 0,   y0: 47 },
  base6: { type: "dots",   spacing: 33.0,  x0: 18,  y0: 17 },
};

function gridSvg(spec, width, height) {
  const els = [];
  const { type, spacing, x0, y0 } = spec;
  if (type === "hlines" || type === "grid") {
    for (let y = y0; y < height; y += spacing)
      els.push(`<line x1="0" y1="${fmt(y)}" x2="${fmt(width)}" y2="${fmt(y)}" stroke="${GRID_COLOR}" stroke-width="${GRID_LINE_WIDTH}"/>`);
  }
  if (type === "grid") {
    for (let x = x0; x < width; x += spacing)
      els.push(`<line x1="${fmt(x)}" y1="0" x2="${fmt(x)}" y2="${fmt(height)}" stroke="${GRID_COLOR}" stroke-width="${GRID_LINE_WIDTH}"/>`);
  } else if (type === "dots") {
    for (let y = y0; y < height; y += spacing)
      for (let x = x0; x < width; x += spacing)
        els.push(`<circle cx="${fmt(x)}" cy="${fmt(y)}" r="${DOT_RADIUS}" fill="${GRID_COLOR}"/>`);
  }
  return els;
}

/* ---------- 页面构建 ---------- */
function pageColor(v) {
  const c = v >>> 0;
  return [(c >> 16) & 0xFF, (c >> 8) & 0xFF, c & 0xFF];
}

function parseTextElement(el, width, height) {
  const html = el.html || "";
  const scale = el.scale || 1.0;
  let srcDpi = 400;
  try { srcDpi = parseInt(JSON.parse(el.data1 || "{}").sourceDpi) || 400; } catch (e) {}
  const lines = [];
  for (const lineHtml of html.split("<br>")) {
    const m = /<font color\s*=\s*"#([0-9a-fA-F]+)">.*?<hw_font size\s*=\s*"([^"]+)">([\s\S]*?)<\/hw_font>/.exec(lineHtml);
    if (!m) continue;
    const col = m[1], size = parseFloat(m[2]);
    const text = m[3].replace(/<[^>]+>/g, "").replace(/&#x([0-9a-fA-F]+);/g, (_, h) => String.fromCodePoint(parseInt(h, 16))).replace(/&#(\d+);/g, (_, d) => String.fromCodePoint(+d));
    const a = col.length >= 8 ? parseInt(col.slice(0, 2), 16) : 255;
    if (a < 128) continue;
    const r = col.length >= 6 ? parseInt(col.slice(2, 4), 16) : 0;
    const g = col.length >= 6 ? parseInt(col.slice(4, 6), 16) : 0;
    const b = col.length >= 6 ? parseInt(col.slice(6, 8), 16) : 0;
    const fontPx = size * scale * srcDpi / 24;
    lines.push({ text, r, g, b, fs: fontPx });
  }
  if (!lines.length) return null;
  return {
    lines,
    x: Math.max(0, (el.positionX || 0) * width),
    y: Math.max(0, (el.positionY || 0) * height),
    width: (el.width || 1) * width,
    height: (el.height || 1) * height,
  };
}

async function buildPage(pageData, files) {
  const ratio = pageData.pageRatio || 0.706;
  // 笔迹坐标系水平宽度恒为 1000；横向时 height=1000*ratio（长边水平），
  // 纵向时 height=1000/ratio。横向若取 width=1000/ratio 会让笔迹只占 70%≈2/3。
  const width = 1000.0;
  let height;
  if (pageData.pageOrientation === 1) {
    height = 1000.0 * ratio;   // 横向：长边水平 1000，垂直=1000*ratio
  } else {
    height = 1000.0 / ratio;   // 纵向：水平 1000，垂直=1000/ratio
  }
  const images = [], texts = [];
  const els = (pageData.pageElement || []).slice().sort((a, b) => (a.positionZ || 0) - (b.positionZ || 0));
  for (const el of els) {
    if (el.elementType === 1) {
      const short = (el.filePath || "").split(/[\\/]/).pop();
      const entry = files[short];
      if (!entry) continue;
      const data = await entry.bytes();
      let mime = null;
      if (data[0] === 0xFF && data[1] === 0xD8) mime = "image/jpeg";
      else if (data[0] === 0x89 && data[1] === 0x50) mime = "image/png";
      if (!mime) continue;
      images.push({
        data, mime,
        x: (el.positionX || 0) * width, y: (el.positionY || 0) * height,
        width: (el.width || 1) * width, height: (el.height || 1) * height,
        angle: el.angle || 0,
      });
    } else if (el.elementType === 0) {
      const t = parseTextElement(el, width, height);
      if (t) texts.push(t);
    }
  }
  const strokes = [];
  for (const att of (pageData.attachment || [])) {
    const short = (att.filePath || "").split(/[\\/]/).pop();
    const entry = files[short];
    if (!entry) continue;
    const data = await entry.bytes();
    if (new TextDecoder().decode(data.subarray(0, 12)) === "PENCILENGINE")
      strokes.push(...parsePencilEngine(data));
  }
  return {
    name: "page-" + (pageData.pageNumber || 0),
    number: pageData.pageNumber || 0,
    width, height,
    isLandscape: width > height,
    background: pageColor(pageData.pageColor ?? -1),
    backgroundTemplate: pageData.background || "",
    strokes, images, texts,
  };
}

/* ---------- SVG 生成 ---------- */
function svgDocument(title, page) {
  const parts = [];
  parts.push(`<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 ${fmt(page.width)} ${fmt(page.height)}">`);
  parts.push(`<rect width="${fmt(page.width)}" height="${fmt(page.height)}" fill="${colorHex(page.background)}"/>`);
  const spec = BACKGROUND_GRIDS[page.backgroundTemplate];
  if (spec) parts.push(...gridSvg(spec, page.width, page.height));
  for (const im of page.images) {
    const b64 = base64(im.data);
    let tf = "";
    if (im.angle % 360) {
      const cx = im.x + im.width / 2, cyy = im.y + im.height / 2;
      tf = ` transform="rotate(${fmt(im.angle)} ${fmt(cx)} ${fmt(cyy)})"`;
    }
    parts.push(`<image href="data:${im.mime};base64,${b64}" x="${fmt(im.x)}" y="${fmt(im.y)}" width="${fmt(im.width)}" height="${fmt(im.height)}"${tf}/>`);
  }
  for (const t of page.texts) {
    const tspans = t.lines.map((ln, i) => {
      const by = t.y + ln.fs * (1 + 1.2 * i);
      const x = i === 0 ? t.x : t.x + t.width * 0.02;
      const esc = ln.text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      return `<tspan x="${fmt(x)}" y="${fmt(by)}" style="fill:rgb(${ln.r},${ln.g},${ln.b});font-size:${fmt(ln.fs)}px">${esc}</tspan>`;
    }).join("");
    parts.push(`<text xml:space="preserve">${tspans}</text>`);
  }
  const ordered = page.strokes.slice().sort((a, b) => (isHighlighter(a) ? 0 : 1) - (isHighlighter(b) ? 0 : 1));
  for (const s of ordered) {
    const outline = strokeOutline(s);
    if (!outline) continue;
    let d = `M ${fmt(outline[0][0])} ${fmt(outline[0][1])}`;
    for (let i = 1; i < outline.length; i++) d += ` L ${fmt(outline[i][0])} ${fmt(outline[i][1])}`;
    d += " Z";
    parts.push(`<path d="${d}" fill="${colorHex(s.color)}" fill-opacity="${fmt(s.opacity)}"/>`);
  }
  parts.push("</svg>");
  return parts.join("\n");
}

/* ============================================================
 * PDF 导出（from-scratch 写入器，与 Python 版一致）
 * 文本经 Canvas 高分辨率栅格后作为图片嵌入（保证中文显示）。
 * ============================================================ */

function jpegSize(data) {
  let off = 2;
  const dv = new DataView(data.buffer, data.byteOffset, data.byteLength);
  while (off + 9 < data.length) {
    if (data[off] !== 0xFF) { off++; continue; }
    const marker = data[off + 1]; off += 2;
    if (marker === 0xD8 || marker === 0xD9 || (marker >= 0xD0 && marker <= 0xD7)) continue;
    const len = dv.getUint16(off, false);
    if ([0xC0,0xC1,0xC2,0xC3,0xC5,0xC6,0xC7,0xC9,0xCA,0xCB,0xCD,0xCE,0xCF].includes(marker)) {
      return { width: dv.getUint16(off + 5, false), height: dv.getUint16(off + 3, false) };
    }
    off += len;
  }
  return { width: 1, height: 1 };
}

async function imageToRgba(data, mime) {
  const blob = new Blob([data], { type: mime });
  const bmp = await createImageBitmap(blob);
  const cv = document.createElement("canvas");
  cv.width = bmp.width; cv.height = bmp.height;
  const ctx = cv.getContext("2d");
  ctx.drawImage(bmp, 0, 0);
  const id = ctx.getImageData(0, 0, cv.width, cv.height);
  const rgb = new Uint8Array(cv.width * cv.height * 3);
  const alpha = new Uint8Array(cv.width * cv.height);
  let hasAlpha = false;
  for (let i = 0, j = 0; i < id.data.length; i += 4, j++) {
    rgb[j * 3] = id.data[i]; rgb[j * 3 + 1] = id.data[i + 1]; rgb[j * 3 + 2] = id.data[i + 2];
    alpha[j] = id.data[i + 3];
    if (id.data[i + 3] < 255) hasAlpha = true;
  }
  return { width: cv.width, height: cv.height, rgb, alpha: hasAlpha ? alpha : null };
}

// 把文本块栅格为高分辨率 RGBA 图（PDF 中文用）
function rasterizeTextElement(t) {
  const SCALE = 3;
  const lines = t.lines;
  const fs = lines[0].fs;
  const cv = document.createElement("canvas");
  // 高度：最后一行基线 + 一个字体高度的余量
  const contentH = fs * (1 + 1.2 * (lines.length - 1)) + fs * 0.55;
  cv.width = Math.max(2, Math.ceil(t.width * SCALE));
  cv.height = Math.max(2, Math.ceil(contentH * SCALE));
  const ctx = cv.getContext("2d");
  lines.forEach((ln, i) => {
    const by = t.y0local ?? (ln.fs * (1 + 1.2 * i));  // 局部坐标基线
    const baseLocal = ln.fs * (1 + 1.2 * i);
    const x = (i === 0 ? 0 : t.width * 0.02) * SCALE;
    ctx.fillStyle = `rgb(${ln.r},${ln.g},${ln.b})`;
    ctx.font = `${ln.fs * SCALE}px "SimHei","Microsoft YaHei","PingFang SC",sans-serif`;
    ctx.textBaseline = "alphabetic";
    ctx.fillText(ln.text, x, baseLocal * SCALE);
  });
  const id = ctx.getImageData(0, 0, cv.width, cv.height);
  const rgb = new Uint8Array(cv.width * cv.height * 3);
  const alpha = new Uint8Array(cv.width * cv.height);
  for (let i = 0, j = 0; i < id.data.length; i += 4, j++) {
    rgb[j * 3] = id.data[i]; rgb[j * 3 + 1] = id.data[i + 1]; rgb[j * 3 + 2] = id.data[i + 2];
    alpha[j] = id.data[i + 3];
  }
  return { width: cv.width, height: cv.height, rgb, alpha, pageW: t.width, pageH: contentH, pageX: t.x, pageY: t.y };
}

function gridPdfCommands(spec, width, height) {
  const cmds = [];
  const [r, g, b] = [221 / 255, 221 / 255, 221 / 255];
  if (spec.type === "hlines" || spec.type === "grid") {
    cmds.push(`${fmt(r)} ${fmt(g)} ${fmt(b)} RG`, `${GRID_LINE_WIDTH} w`);
    for (let y = spec.y0; y < height; y += spec.spacing) {
      const py = height - y;
      cmds.push(`0 ${fmt(py)} m ${fmt(width)} ${fmt(py)} l S`);
    }
    if (spec.type === "grid") {
      for (let x = spec.x0; x < width; x += spec.spacing)
        cmds.push(`${fmt(x)} 0 m ${fmt(x)} ${fmt(height)} l S`);
    }
  } else if (spec.type === "dots") {
    cmds.push(`${fmt(r)} ${fmt(g)} ${fmt(b)} rg`);
    const side = DOT_RADIUS * 2;
    for (let y = spec.y0; y < height; y += spec.spacing) {
      const py = height - y;
      for (let x = spec.x0; x < width; x += spec.spacing)
        cmds.push(`${fmt(x - DOT_RADIUS)} ${fmt(py - DOT_RADIUS)} ${fmt(side)} ${fmt(side)} re f`);
    }
  }
  return cmds;
}

async function buildPdf(pages, onProgress) {
  // 预解码所有图片 + 栅格化所有文本（异步）
  for (let pi = 0; pi < pages.length; pi++) {
    const page = pages[pi];
    page._pdfImages = [];
    for (const im of page.images) {
      if (im.mime === "image/jpeg") {
        const { width, height } = jpegSize(im.data);
        page._pdfImages.push({ kind: "jpeg", data: im.data, width, height, x: im.x, y: im.y, w: im.width, h: im.height, angle: im.angle });
      } else if (im.mime === "image/png") {
        const r = await imageToRgba(im.data, im.mime);
        page._pdfImages.push({ kind: "png", ...r, x: im.x, y: im.y, w: im.width, h: im.height, angle: im.angle });
      }
    }
    for (const t of page.texts) {
      const r = rasterizeTextElement(t);
      page._pdfImages.push({ kind: "png", ...r, x: r.pageX, y: r.pageY, w: r.pageW, h: r.pageH, angle: 0, isText: true });
    }
    if (onProgress) await onProgress(60 + Math.round(20 * (pi + 1) / pages.length));
  }

  const objects = [te.encode("<< /Type /Catalog /Pages 2 0 R >>"), new Uint8Array(0)];
  const pageIds = [];
  const enc = s => te.encode(s);

  for (let pi = 0; pi < pages.length; pi++) {
    const page = pages[pi];
    const imageIds = {}, opacityIds = {};
    // 图片 XObject
    for (let idx = 0; idx < page._pdfImages.length; idx++) {
      const im = page._pdfImages[idx];
      if (im.kind === "jpeg") {
        imageIds[idx] = objects.length + 1;
        objects.push(u8concat([
          enc(`<< /Type /XObject /Subtype /Image /Width ${im.width} /Height ${im.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${im.data.length} >>\nstream\n`),
          im.data, enc("\nendstream")
        ]));
      } else {
        let smask = "";
        if (im.alpha) {
          const compA = await deflate(im.alpha);
          const alphaId = objects.length + 1;
          objects.push(u8concat([
            enc(`<< /Type /XObject /Subtype /Image /Width ${im.width} /Height ${im.height} /ColorSpace /DeviceGray /BitsPerComponent 8 /Filter /FlateDecode /Length ${compA.length} >>\nstream\n`),
            compA, enc("\nendstream")
          ]));
          smask = ` /SMask ${alphaId} 0 R`;
        }
        const compR = await deflate(im.rgb);
        imageIds[idx] = objects.length + 1;
        objects.push(u8concat([
          enc(`<< /Type /XObject /Subtype /Image /Width ${im.width} /Height ${im.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /FlateDecode /Length ${compR.length}${smask} >>\nstream\n`),
          compR, enc("\nendstream")
        ]));
      }
    }
    for (const op of new Set(page.strokes.map(s => s.opacity))) {
      opacityIds[op] = objects.length + 1;
      objects.push(enc(`<< /Type /ExtGState /CA ${fmt(op)} /ca ${fmt(op)} >>`));
    }

    // 内容流
    const [br, bg, bb] = page.background.map(c => c / 255);
    const cmds = [`${fmt(br)} ${fmt(bg)} ${fmt(bb)} rg`, `0 0 ${fmt(page.width)} ${fmt(page.height)} re f`];
    const spec = BACKGROUND_GRIDS[page.backgroundTemplate];
    if (spec) cmds.push(...gridPdfCommands(spec, page.width, page.height));
    // 图片（背景图 + 文本图）
    for (let idx = 0; idx < page._pdfImages.length; idx++) {
      const im = page._pdfImages[idx];
      const angle = -im.angle * Math.PI / 180;
      const cos = Math.cos(angle), sin = Math.sin(angle);
      const cx = im.x + im.w / 2, cyy = page.height - im.y - im.h / 2;
      cmds.push("q",
        `1 0 0 1 ${fmt(cx)} ${fmt(cyy)} cm`,
        `${fmt(cos)} ${fmt(sin)} ${fmt(-sin)} ${fmt(cos)} 0 0 cm`,
        `${fmt(im.w)} 0 0 ${fmt(im.h)} ${fmt(-im.w / 2)} ${fmt(-im.h / 2)} cm`,
        `/Im${idx} Do`, "Q");
    }
    // 笔迹（荧光笔先画）
    const ordered = page.strokes.slice().sort((a, b) => (isHighlighter(a) ? 0 : 1) - (isHighlighter(b) ? 0 : 1));
    for (const s of ordered) {
      const outline = strokeOutline(s);
      if (!outline) continue;
      const [r, g, b] = s.color.map(c => c / 255);
      cmds.push(`${fmt(r)} ${fmt(g)} ${fmt(b)} rg`);
      cmds.push(`/GS${fmt(s.opacity).replace(".", "_")} gs`);
      cmds.push(`${fmt(outline[0][0])} ${fmt(page.height - outline[0][1])} m`);
      for (let i = 1; i < outline.length; i++)
        cmds.push(`${fmt(outline[i][0])} ${fmt(page.height - outline[i][1])} l`);
      cmds.push("h f");
    }
    const stream = enc(cmds.join("\n") + "\n");
    const contentId = objects.length + 1, pageId = contentId + 1;
    objects.push(u8concat([enc(`<< /Length ${stream.length} >>\nstream\n`), stream, enc("endstream")]));
    const xobjs = Object.entries(imageIds).map(([i, id]) => `/Im${i} ${id} 0 R`).join(" ");
    const states = Object.entries(opacityIds).map(([o, id]) => `/GS${fmt(+o).replace(".", "_")} ${id} 0 R`).join(" ");
    objects.push(enc(
      `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${fmt(page.width)} ${fmt(page.height)}] ` +
      `/Contents ${contentId} 0 R /Resources << /XObject << ${xobjs} >> /ExtGState << ${states} >> >> >>`
    ));
    pageIds.push(pageId);
    if (onProgress) await onProgress(80 + Math.round(18 * (pi + 1) / pages.length));
  }

  objects[1] = enc(`<< /Type /Pages /Kids [${pageIds.map(id => id + " 0 R").join(" ")}] /Count ${pageIds.length} >>`);

  // 组装 + xref
  const out = [enc("%PDF-1.7\n%\xe2\xe3\xcf\xd3\n")];
  const offsets = [0];
  objects.forEach((obj, i) => {
    offsets.push(u8concat(out).length);
    out.push(enc(`${i + 1} 0 obj\n`), obj, enc("\nendobj\n"));
  });
  const xrefPos = u8concat(out).length;
  out.push(enc(`xref\n0 ${objects.length + 1}\n0000000000 65535 f \n`));
  for (let i = 1; i < offsets.length; i++)
    out.push(enc(String(offsets[i]).padStart(10, "0") + " 00000 n \n"));
  out.push(enc(`trailer\n<< /Size ${objects.length + 1} /Root 1 0 R >>\nstartxref\n${xrefPos}\n%%EOF\n`));
  return u8concat(out);
}

/* ---------- ZIP 写出（存储方式，供 SVG 打包下载） ---------- */
const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1;
    t[n] = c >>> 0;
  }
  return t;
})();
function crc32(bytes) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) c = CRC_TABLE[(c ^ bytes[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}
function buildZip(entries) {
  // entries: [{name, data:Uint8Array}]，全部 stored
  const enc = new TextEncoder();
  const parts = [], central = [];
  let offset = 0;
  const push16 = v => { const b = new Uint8Array(2); new DataView(b.buffer).setUint16(0, v, true); return b; };
  const push32 = v => { const b = new Uint8Array(4); new DataView(b.buffer).setUint32(0, v, true); return b; };
  for (const e of entries) {
    const name = enc.encode(e.name);
    const crc = crc32(e.data);
    const local = u8concat([
      push32(0x04034b50), push16(20), push16(0), push16(0), push16(0), push16(0),
      push32(crc), push32(e.data.length), push32(e.data.length),
      push16(name.length), push16(0), name, e.data
    ]);
    central.push({ name, crc, size: e.data.length, offset });
    parts.push(local);
    offset += local.length;
  }
  const cdStart = offset;
  for (const c of central) {
    parts.push(u8concat([
      push32(0x02014b50), push16(20), push16(20), push16(0), push16(0), push16(0), push16(0),
      push32(c.crc), push32(c.size), push32(c.size),
      push16(c.name.length), push16(0), push16(0), push16(0), push16(0), push32(0), push32(c.offset), c.name
    ]));
    offset = u8concat(parts).length;
  }
  const cdSize = u8concat(parts).length - cdStart;
  parts.push(u8concat([
    push32(0x06054b50), push16(0), push16(0), push16(central.length), push16(central.length),
    push32(cdSize), push32(cdStart), push16(0)
  ]));
  return u8concat(parts);
}

/* ============================================================
 * UI 逻辑
 * ============================================================ */
const $ = id => document.getElementById(id);
let PAGES = [], SVG_CACHE = [], ARCHIVE_NAME = "note";

function setProgress(pct, text) {
  $("progressWrap").style.display = "block";
  $("progressBar").style.width = pct + "%";
  if (text) $("progressText").textContent = text;
  return tick();
}
function notice(msg) { const n = $("notice"); n.style.display = "block"; n.textContent = msg; }

async function processFile(file) {
  $("grid").style.display = "none"; $("toolbar").style.display = "none";
  $("notice").style.display = "none";
  $("btnSvg").disabled = true; $("btnPdf").disabled = true;
  PAGES = []; SVG_CACHE = [];
  ARCHIVE_NAME = file.name.replace(/\.hinote$/i, "");
  try {
    await setProgress(2, "读取文件…");
    const buf = new Uint8Array(await file.arrayBuffer());
    const zipEntries = readZip(buf);
    await setProgress(8, "解压容器…");

    // 准备可解压的 entry.bytes()
    const files = {};
    const names = Object.keys(zipEntries);
    let di = 0;
    for (const name of names) {
      const e = zipEntries[name];
      files[name] = {
        _raw: e.raw, _method: e.method, _bytes: null,
        async bytes() {
          if (!this._bytes) {
            this._bytes = this._method === 8 ? await inflateRaw(this._raw) : this._raw;
          }
          return this._bytes;
        }
      };
      di++;
      if (di % 20 === 0) await setProgress(8 + Math.round(12 * di / names.length), `解压 ${di}/${names.length}…`);
    }

    // 找页面（pages/*.jhinote, GZIP+JSON）
    await setProgress(20, "解析页面元数据…");
    const pageDatas = [];
    for (const name of names) {
      if (zipEntries[name].fullName.startsWith("pages/") && zipEntries[name].fullName.endsWith(".jhinote")) {
        const raw = await files[name].bytes();
        const jsonBytes = await gunzip(raw);
        const obj = JSON.parse(new TextDecoder().decode(jsonBytes));
        pageDatas.push(obj.customNotePageContent || obj);
      }
    }
    pageDatas.sort((a, b) => (a.pageNumber || 0) - (b.pageNumber || 0));

    // 逐页构建
    for (let i = 0; i < pageDatas.length; i++) {
      await setProgress(24 + Math.round(20 * (i + 1) / pageDatas.length), `解析页面 ${i + 1}/${pageDatas.length}…`);
      const page = await buildPage(pageDatas[i], files);
      if (page.strokes.length || page.images.length || BACKGROUND_GRIDS[page.backgroundTemplate])
        PAGES.push(page);
    }
    if (!PAGES.length) { notice("未在文件中找到可渲染的页面（可能是无边画布格式 PENKITINFENG，暂不支持）。"); return; }

    // 渲染 SVG
    for (let i = 0; i < PAGES.length; i++) {
      await setProgress(44 + Math.round(14 * (i + 1) / PAGES.length), `渲染 ${i + 1}/${PAGES.length}…`);
      SVG_CACHE.push(svgDocument(`${ARCHIVE_NAME}: ${PAGES[i].name}`, PAGES[i]));
    }

    renderGrid();
    $("toolbar").style.display = "flex";
    $("metaText").innerHTML = `<b>${file.name}</b> · ${PAGES.length} 页 · ${(file.size / 1024 / 1024).toFixed(2)} MB`;
    // 横向笔记应用：当多数页面为横向时自动进入横向滚动视图
    const landCount = PAGES.filter(p => p.isLandscape).length;
    setLandscapeMode(landCount > 0 && landCount >= PAGES.length - landCount);
    $("btnView").disabled = false;
    $("btnSvg").disabled = false; $("btnPdf").disabled = false;
    await setProgress(100, `完成：${PAGES.length} 页已解析`);
    setTimeout(() => { $("progressWrap").style.display = "none"; }, 1200);
  } catch (err) {
    console.error(err);
    notice("解析失败：" + err.message);
    $("progressWrap").style.display = "none";
  }
}

function renderGrid() {
  const grid = $("grid");
  grid.innerHTML = "";
  PAGES.forEach((page, i) => {
    const card = document.createElement("div");
    card.className = "page-card";
    // 用页面真实宽高比驱动缩略图，避免横向页被拉伸成纵向
    card.style.setProperty("--ar", `${page.width} / ${page.height}`);
    const ori = page.isLandscape ? '<span class="ori">横向</span>' : "纵向";
    card.innerHTML = `<div class="thumb">${SVG_CACHE[i]}</div>
      <div class="label"><span>第 ${page.number} 页 · ${ori}</span><span>${page.strokes.length} 笔</span></div>`;
    card.onclick = () => { $("modalBox").innerHTML = SVG_CACHE[i]; $("modal").classList.add("open"); };
    grid.appendChild(card);
  });
  grid.style.display = "grid";
}

/* 横向 / 网格视图切换 */
let landscapeMode = false;
function setLandscapeMode(on) {
  landscapeMode = on;
  document.body.classList.toggle("landscape-mode", on);
  const btn = $("btnView");
  btn.classList.toggle("primary", on);
  btn.textContent = on ? "网格视图" : "横向视图";
}

/* 事件绑定 */
const dz = $("dropzone"), fi = $("fileInput");
dz.onclick = () => fi.click();
fi.onchange = e => { if (e.target.files[0]) processFile(e.target.files[0]); };
dz.ondragover = e => { e.preventDefault(); dz.classList.add("drag"); };
dz.ondragleave = () => dz.classList.remove("drag");
dz.ondrop = e => {
  e.preventDefault(); dz.classList.remove("drag");
  const f = e.dataTransfer.files[0];
  if (f) processFile(f);
};
$("btnView").onclick = () => setLandscapeMode(!landscapeMode);
$("modal").onclick = e => { if (e.target.id === "modal" || e.target.className === "close") $("modal").classList.remove("open"); };
document.onkeydown = e => { if (e.key === "Escape") $("modal").classList.remove("open"); };

function download(bytes, name, mime) {
  const blob = new Blob([bytes], { type: mime });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

$("btnSvg").onclick = async () => {
  if (!SVG_CACHE.length) return;
  $("btnSvg").disabled = true;
  await setProgress(5, "打包 SVG…");
  const entries = PAGES.map((p, i) => ({ name: `${ARCHIVE_NAME}/${p.name}.svg`, data: te.encode(SVG_CACHE[i]) }));
  const zip = buildZip(entries);
  download(zip, `${ARCHIVE_NAME}-svg.zip`, "application/zip");
  await setProgress(100, "SVG 打包完成");
  $("btnSvg").disabled = false;
};

$("btnPdf").onclick = async () => {
  if (!PAGES.length) return;
  $("btnPdf").disabled = true;
  try {
    const pdf = await buildPdf(PAGES, (pct) => setProgress(pct, `生成 PDF… ${pct}%`));
    download(pdf, `${ARCHIVE_NAME}.pdf`, "application/pdf");
    await setProgress(100, "PDF 导出完成");
  } catch (err) {
    console.error(err);
    notice("PDF 导出失败：" + err.message);
  }
  $("btnPdf").disabled = false;
};
</script>
